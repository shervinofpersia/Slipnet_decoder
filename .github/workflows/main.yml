name: SlipNet APK Extractor

on:
  workflow_dispatch:
    inputs:
      apk_url:
        description: 'آدرس مستقیم APK'
        required: true
        default: 'https://github.com/anonvector/SlipNet/releases/download/v2.5.5/SlipNet-v2.5.5-full-release-arm64-v8a.apk'

jobs:
  extract:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Extractor
        run: python extract_slipnet.py "${{ inputs.apk_url }}"

      - name: Commit results to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add all_strings.txt crypto_keys.txt
          git commit -m "Update SlipNet analysis results - $(date)" || echo "No changes to commit"
          git push

      - name: Show Raw Links
        run: |
          echo "=== لینک‌های Raw مستقیم ==="
          echo "all_strings.txt:"
          echo "https://raw.githubusercontent.com/${{ github.repository }}/main/all_strings.txt"
          echo ""
          echo "crypto_keys.txt:"
          echo "https://raw.githubusercontent.com/${{ github.repository }}/main/crypto_keys.txt"
